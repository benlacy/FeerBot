<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Overlay</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            font-family: Roboto, Arial, sans-serif;
            color: #fff;
        }
        #container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: inline-block; /* shrink-to-fit container */
            width: auto;          /* let content define width */
            max-width: 95vw;      /* cap at viewport width */
            padding: 20px;
            background: rgba(0,0,0,0.45);
            border-radius: 12px;
            backdrop-filter: blur(2px);
        }
        h1 {
            margin: 0 0 12px 0;
            font-size: 40px;
            color: #bd91ff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        li {
            font-size: 36px;
            margin: 8px 0;
            padding: 6px 10px;
            background: rgba(0,0,0,0.45);
            border-radius: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            white-space: nowrap; /* keep on one line so container matches longest */
            display: flex;
            align-items: center;
        }
        .user { 
            font-weight: 700; 
            color: #ffd166; 
        }
        .score { 
            font-weight: 600; 
            font-size: 32px;
            padding: 4px 8px;
            border-radius: 6px;
            min-width: 60px;
            text-align: center;
            margin-right: 12px;
        }
        .score.positive {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.2);
            border: 2px solid rgba(74, 222, 128, 0.4);
        }
        .score.negative {
            color: #f87171;
            background: rgba(248, 113, 113, 0.2);
            border: 2px solid rgba(248, 113, 113, 0.4);
        }
        .score.zero {
            color: #94a3b8;
            background: rgba(148, 163, 184, 0.2);
            border: 2px solid rgba(148, 163, 184, 0.4);
        }
        #empty { 
            font-size: 32px; 
            opacity: 0.9; 
            text-align: center;
            padding: 20px;
        }
    </style>
    <script>
        let socket;

        function connectWebSocket() {
            socket = new WebSocket("ws://localhost:6790");

            socket.onopen = function() {
                console.log("Connected to WebSocket server");
            };

            socket.onmessage = function(event) {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload && payload.type === 'scores') {
                        renderScores(payload.scores || []);
                    }
                } catch (e) {
                    // ignore non-JSON messages
                }
            };

            socket.onclose = function() {
                console.log("WebSocket connection closed. Attempting to reconnect...");
                setTimeout(connectWebSocket, 3000);
            };

            socket.onerror = function(error) {
                console.log("WebSocket error:", error);
                socket.close();
            };
        }

        function renderScores(scores) {
            const list = document.getElementById('list');
            const empty = document.getElementById('empty');
            list.innerHTML = '';

            if (!scores || scores.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            scores.forEach(([user, score]) => {
                const li = document.createElement('li');
                const scoreSpan = document.createElement('span');
                const userSpan = document.createElement('span');

                scoreSpan.textContent = score > 0 ? `+${score}` : score.toString();
                scoreSpan.className = 'score';
                
                // Add appropriate class based on score value
                if (score > 0) {
                    scoreSpan.classList.add('positive');
                } else if (score < 0) {
                    scoreSpan.classList.add('negative');
                } else {
                    scoreSpan.classList.add('zero');
                }

                userSpan.textContent = user;
                userSpan.className = 'user';

                li.appendChild(scoreSpan);
                li.appendChild(userSpan);
                list.appendChild(li);
            });
        }

        window.onload = connectWebSocket;
    </script>
    </head>
<body>
    <div id="container">
        <h1>Chatter Sentiment</h1>
        <div id="empty">No scores yet</div>
        <ul id="list"></ul>
    </div>
</body>
</html>
