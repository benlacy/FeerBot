<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mic TTS Text Bubble Overlay</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            font-family: Arial, sans-serif;
        }

        .text-bubble-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
        }

        .text-bubble {
            position: relative;
            background: #000000;
            border: 4px solid #FF0000;
            border-radius: 25px;
            padding: 35px 50px;
            box-shadow: 
                0 0 20px rgba(255, 0, 0, 0.6),
                0 0 40px rgba(255, 0, 0, 0.3),
                0 8px 24px rgba(0, 0, 0, 0.8),
                inset 0 0 15px rgba(255, 215, 0, 0.1);
            max-width: 100%;
            word-wrap: break-word;
            animation: bubbleAppear 0.3s ease-out;
        }

        /* Gold inner border accent */
        .text-bubble::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            pointer-events: none;
        }

        /* Speech bubble tail/pointer - red like Shadow's stripes */
        .text-bubble::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 20px solid #FF0000;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.6));
        }

        .text-bubble-content {
            color: #FFFFFF;
            font-size: 36px;
            font-weight: 600;
            line-height: 1.5;
            margin: 0;
            text-shadow: 
                0 0 8px rgba(255, 0, 0, 0.5),
                2px 2px 4px rgba(0, 0, 0, 0.9);
        }

        @keyframes bubbleAppear {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="text-bubble-container hidden" id="text-bubble-container">
        <div class="text-bubble">
            <p class="text-bubble-content" id="text-bubble-message"></p>
        </div>
    </div>

    <script>
        const textBubbleContainer = document.getElementById('text-bubble-container');
        const textBubbleMessage = document.getElementById('text-bubble-message');
        let ws = null;
        let reconnectTimeout = null;
        const wsUrl = 'ws://localhost:6790';
        
        // Initialize audio context early (required for OBS browser sources)
        let audioContext = null;
        
        async function initializeAudioContext() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // Resume audio context if suspended (required by OBS browser sources)
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                    console.log('Audio context resumed');
                }
            } catch (e) {
                console.error('Error initializing audio context:', e);
            }
        }
        
        // Initialize audio context on page load (critical for OBS)
        initializeAudioContext();
        
        function connectWebSocket() {
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    console.log('Connected to mic TTS overlay WebSocket');
                    if (reconnectTimeout) {
                        clearTimeout(reconnectTimeout);
                        reconnectTimeout = null;
                    }
                    // Ensure audio context is ready when WebSocket connects
                    initializeAudioContext();
                };
                
                ws.onmessage = async (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        console.log('Received WebSocket message:', data);
                        
                        if (data.type === 'mic_tts') {
                            console.log('Processing mic TTS message:', data.message);
                            textBubbleMessage.textContent = data.message || '';
                            textBubbleContainer.classList.remove('hidden');
                            
                            // Play TTS if audio data URL is provided
                            let audio = null;
                            let fallbackTimeout = null;
                            
                            if (data.audio_data_url) {
                                console.log('Audio data URL present, playing audio');
                                audio = await playAudioFromDataUrl(data.audio_data_url);
                                
                                if (audio) {
                                    // Hide overlay when audio finishes, but add extra time for reading
                                    audio.addEventListener('ended', () => {
                                        console.log('Audio ended, keeping overlay visible for reading');
                                        if (fallbackTimeout) {
                                            clearTimeout(fallbackTimeout);
                                            fallbackTimeout = null;
                                        }
                                        // Keep visible for extra 3 seconds after audio ends for easier reading
                                        const extraReadTime = 3000;
                                        fallbackTimeout = setTimeout(() => {
                                            console.log('Extra read time elapsed, hiding overlay');
                                            fallbackTimeout = null;
                                            textBubbleContainer.classList.add('hidden');
                                        }, extraReadTime);
                                    });
                                    
                                    // Fallback timeout in case audio doesn't fire 'ended' event
                                    // Use a generous estimate (300% of estimated duration) as safety net, plus extra read time
                                    const wordCount = (data.message || '').split(/\s+/).length;
                                    const estimatedDuration = Math.max(8000, (wordCount / 150) * 60 * 1000 * 3); // 3x estimate for safety
                                    const extraReadTime = 5000; // Extra 5 seconds for reading
                                    
                                    fallbackTimeout = setTimeout(() => {
                                        console.log('Fallback timeout reached, hiding overlay');
                                        fallbackTimeout = null;
                                        textBubbleContainer.classList.add('hidden');
                                    }, estimatedDuration + extraReadTime);
                                } else {
                                    // Audio failed to load, use estimated duration with extra read time
                                    const wordCount = (data.message || '').split(/\s+/).length;
                                    const duration = Math.max(5000, (wordCount / 150) * 60 * 1000);
                                    const extraReadTime = 5000; // Extra 5 seconds for reading
                                    fallbackTimeout = setTimeout(() => {
                                        textBubbleContainer.classList.add('hidden');
                                    }, duration + extraReadTime);
                                }
                            } else {
                                console.warn('No audio data URL provided');
                                // No audio, use estimated duration with extra read time
                                const wordCount = (data.message || '').split(/\s+/).length;
                                const duration = Math.max(5000, (wordCount / 150) * 60 * 1000);
                                const extraReadTime = 5000; // Extra 5 seconds for reading
                                fallbackTimeout = setTimeout(() => {
                                    textBubbleContainer.classList.add('hidden');
                                }, duration + extraReadTime);
                            }
                        }
                    } catch (e) {
                        console.error('Invalid message from server:', event.data);
                    }
                };
                
                ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                };
                
                ws.onclose = () => {
                    console.warn('WebSocket connection closed, reconnecting...');
                    reconnectTimeout = setTimeout(connectWebSocket, 3000);
                };
            } catch (error) {
                console.error('Failed to connect WebSocket:', error);
                reconnectTimeout = setTimeout(connectWebSocket, 3000);
            }
        }
        
        async function playAudioFromDataUrl(audioDataUrl) {
            try {
                console.log('Playing audio from data URL (length:', audioDataUrl.length, 'chars)');
                
                // Ensure audio context is ready (critical for OBS)
                await initializeAudioContext();
                
                try {
                    // Use Web Audio API approach (like bomb_overlay) for OBS compatibility
                    // Convert data URL to ArrayBuffer
                    const base64Data = audioDataUrl.split(',')[1];
                    const binaryString = atob(base64Data);
                    const arrayBuffer = new ArrayBuffer(binaryString.length);
                    const uint8Array = new Uint8Array(arrayBuffer);
                    for (let i = 0; i < binaryString.length; i++) {
                        uint8Array[i] = binaryString.charCodeAt(i);
                    }
                    
                    // Decode audio data
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    
                    // Create buffer source
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    
                    // Connect to destination (speakers)
                    source.connect(audioContext.destination);
                    
                    // Track when audio finishes
                    let endedCallback = null;
                    const audioDuration = audioBuffer.duration * 1000; // Convert to milliseconds
                    
                    source.addEventListener('ended', () => {
                        console.log('Audio playback finished via Web Audio API');
                        if (endedCallback) {
                            endedCallback();
                        }
                    });
                    
                    source.start(0);
                    console.log('Audio playback started via Web Audio API, duration:', audioDuration, 'ms');
                    
                    // Return a mock audio object with ended event for compatibility
                    const mockAudio = {
                        addEventListener: (event, callback) => {
                            if (event === 'ended') {
                                endedCallback = callback;
                            }
                        },
                        duration: audioDuration
                    };
                    
                    return mockAudio;
                } catch (webAudioError) {
                    console.error('Web Audio API failed, trying fallback:', webAudioError);
                    
                    // Fallback to Audio() element with data URL
                    const audio = new Audio(audioDataUrl);
                    audio.volume = 1.0;
                    
                    // Add error handlers
                    audio.addEventListener('error', (e) => {
                        console.error('Audio playback error:', e, audio.error);
                    });
                    
                    // Try to play the audio
                    try {
                        // Ensure audio context is resumed before playing
                        if (audioContext && audioContext.state === 'suspended') {
                            await audioContext.resume();
                            console.log('Audio context resumed before playback');
                        }
                        
                        const playPromise = audio.play();
                        if (playPromise !== undefined) {
                            await playPromise;
                            console.log('Audio playback started successfully (fallback)');
                        }
                    } catch (playError) {
                        console.error('Error playing audio:', playError);
                        // Try to resume audio context and play again
                        try {
                            await initializeAudioContext();
                            // Try playing again after ensuring context is ready
                            await audio.play();
                            console.log('Audio playback started after context resume');
                        } catch (retryError) {
                            console.error('Failed to play audio after retry:', retryError);
                        }
                    }
                    
                    return audio;
                }
            } catch (e) {
                console.error('Error in playAudioFromDataUrl:', e);
                console.error('Error details:', {
                    message: e.message,
                    stack: e.stack,
                    name: e.name,
                    toString: e.toString()
                });
                // Also log if it's a specific type of error
                if (e instanceof TypeError) {
                    console.error('TypeError - possibly audio format issue');
                } else if (e instanceof DOMException) {
                    console.error('DOMException - possibly audio context issue:', e.message);
                } else if (e instanceof Error) {
                    console.error('General Error:', e.message);
                }
            }
            return null;
        }

        // Initial connection
        connectWebSocket();
    </script>
</body>
</html>
