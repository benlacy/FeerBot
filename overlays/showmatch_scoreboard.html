<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road to Worlds: Nwpo vs Mawkzy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      background-color: #1e1e1e;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #444;
      padding: 8px 12px;
      text-align: center;
    }
    th {
      background-color: #222;
    }
    td[contenteditable] {
      background-color: #2a2a2a;
      outline: none;
      transition: background 0.2s;
    }
    .highlight-win {
      background-color: #217a3a !important;
      color: #fff;
    }
    .highlight-loss {
      background-color: #a32d2d !important;
      color: #fff;
    }
    .highlight-best {
      background-color: #217a3a !important;
      color: #fff;
    }
    tfoot td {
      font-weight: bold;
      background-color: #181818;
    }
    .opponent {
      font-weight: bold;
      background-color: #181818;
    }
  </style>
</head>
<body>
  <h2>Road to Worlds: Nwpo vs Mawkzy</h2>
  <table id="scoreboard">
    <thead>
      <tr>
        <th rowspan="2">Opponent</th>
        <th colspan="2"><img src="https://flagcdn.com/48x36/sa.png" alt="Saudi Arabia" style="vertical-align:middle;margin-right:6px;width:24px;height:18px;">Nwpo</th>
        <th colspan="2"><img src="https://flagcdn.com/48x36/fr.png" alt="France" style="vertical-align:middle;margin-right:6px;width:24px;height:18px;">Mawkzy</th>
      </tr>
      <tr>
        <th>W</th>
        <th>L</th>
        <th>W</th>
        <th>L</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="opponent" contenteditable="true">Rezears</td>
        <td contenteditable="true" class="nwpo-win">2</td>
        <td contenteditable="true" class="nwpo-loss">3</td>
        <td contenteditable="true" class="mawkzy-win">3</td>
        <td contenteditable="true" class="mawkzy-loss">1</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">dralii</td>
        <td contenteditable="true" class="nwpo-win">1</td>
        <td contenteditable="true" class="nwpo-loss">3</td>
        <td contenteditable="true" class="mawkzy-win">1</td>
        <td contenteditable="true" class="mawkzy-loss">3</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">Toxiic</td>
        <td contenteditable="true" class="nwpo-win">3</td>
        <td contenteditable="true" class="nwpo-loss">0</td>
        <td contenteditable="true" class="mawkzy-win">0</td>
        <td contenteditable="true" class="mawkzy-loss">3</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">Vatira</td>
        <td contenteditable="true" class="nwpo-win">0</td>
        <td contenteditable="true" class="nwpo-loss">3</td>
        <td contenteditable="true" class="mawkzy-win">1</td>
        <td contenteditable="true" class="mawkzy-loss">3</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">Nass</td>
        <td contenteditable="true" class="nwpo-win">0</td>
        <td contenteditable="true" class="nwpo-loss">3</td>
        <td contenteditable="true" class="mawkzy-win">3</td>
        <td contenteditable="true" class="mawkzy-loss">1</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">Joreuz</td>
        <td contenteditable="true" class="nwpo-win">3</td>
        <td contenteditable="true" class="nwpo-loss">1</td>
        <td contenteditable="true" class="mawkzy-win">3</td>
        <td contenteditable="true" class="mawkzy-loss">2</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">Stizzy</td>
        <td contenteditable="true" class="nwpo-win">3</td>
        <td contenteditable="true" class="nwpo-loss">0</td>
        <td contenteditable="true" class="mawkzy-win">3</td>
        <td contenteditable="true" class="mawkzy-loss">0</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">TempoH</td>
        <td contenteditable="true" class="nwpo-win">3</td>
        <td contenteditable="true" class="nwpo-loss">0</td>
        <td contenteditable="true" class="mawkzy-win">3</td>
        <td contenteditable="true" class="mawkzy-loss">0</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">Nuqqet</td>
        <td contenteditable="true" class="nwpo-win">3</td>
        <td contenteditable="true" class="nwpo-loss">0</td>
        <td contenteditable="true" class="mawkzy-win">3</td>
        <td contenteditable="true" class="mawkzy-loss">0</td>
      </tr>
      <tr>
        <td class="opponent" contenteditable="true">dralii (again)</td>
        <td contenteditable="true" class="nwpo-win"></td>
        <td contenteditable="true" class="nwpo-loss"></td>
        <td contenteditable="true" class="mawkzy-win"></td>
        <td contenteditable="true" class="mawkzy-loss"></td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td>Games</td>
        <td id="nwpo-games-total" colspan="2">0-0 (0)</td>
        <td id="mawkzy-games-total" colspan="2">0-0 (0)</td>
      </tr>
      <tr>
        <td>Series</td>
        <td id="nwpo-series-total" colspan="2">0-0 (0)</td>
        <td id="mawkzy-series-total" colspan="2">0-0 (0)</td>
      </tr>
    </tfoot>
  </table>
  <script>
    function sumColumn(className) {
      return Array.from(document.querySelectorAll('.' + className))
        .map(td => parseInt(td.textContent) || 0)
        .reduce((a, b) => a + b, 0);
    }
    function updateTotals() {
      const nwpoW = sumColumn('nwpo-win');
      const nwpoL = sumColumn('nwpo-loss');
      const mawkzyW = sumColumn('mawkzy-win');
      const mawkzyL = sumColumn('mawkzy-loss');
      const nwpoDiff = nwpoW - nwpoL;
      const mawkzyDiff = mawkzyW - mawkzyL;
      document.getElementById('nwpo-games-total').textContent = `${nwpoW}-${nwpoL} (${nwpoDiff > 0 ? '+' : ''}${nwpoDiff})`;
      document.getElementById('mawkzy-games-total').textContent = `${mawkzyW}-${mawkzyL} (${mawkzyDiff > 0 ? '+' : ''}${mawkzyDiff})`;
      // Highlight best for Games row
      const nwpoGamesCell = document.getElementById('nwpo-games-total');
      const mawkzyGamesCell = document.getElementById('mawkzy-games-total');
      nwpoGamesCell.classList.remove('highlight-best');
      mawkzyGamesCell.classList.remove('highlight-best');
      if (nwpoDiff > mawkzyDiff) {
        nwpoGamesCell.classList.add('highlight-best');
      } else if (mawkzyDiff > nwpoDiff) {
        mawkzyGamesCell.classList.add('highlight-best');
      }
      // Calculate and display Series totals
      let nwpoSeriesW = 0, nwpoSeriesL = 0;
      let mawkzySeriesW = 0, mawkzySeriesL = 0;
      const rows = document.querySelectorAll('#scoreboard tbody tr');
      rows.forEach(row => {
        const nwpoW = row.querySelector('.nwpo-win');
        const nwpoL = row.querySelector('.nwpo-loss');
        const mawkzyW = row.querySelector('.mawkzy-win');
        const mawkzyL = row.querySelector('.mawkzy-loss');
        if (nwpoW && nwpoL) {
          const w = parseInt(nwpoW.textContent) || 0;
          const l = parseInt(nwpoL.textContent) || 0;
          if (w > l) nwpoSeriesW++;
          else if (w < l) nwpoSeriesL++;
        }
        if (mawkzyW && mawkzyL) {
          const w = parseInt(mawkzyW.textContent) || 0;
          const l = parseInt(mawkzyL.textContent) || 0;
          if (w > l) mawkzySeriesW++;
          else if (w < l) mawkzySeriesL++;
        }
      });
      const nwpoSeriesDiff = nwpoSeriesW - nwpoSeriesL;
      const mawkzySeriesDiff = mawkzySeriesW - mawkzySeriesL;
      document.getElementById('nwpo-series-total').textContent = `${nwpoSeriesW}-${nwpoSeriesL} (${nwpoSeriesDiff > 0 ? '+' : ''}${nwpoSeriesDiff})`;
      document.getElementById('mawkzy-series-total').textContent = `${mawkzySeriesW}-${mawkzySeriesL} (${mawkzySeriesDiff > 0 ? '+' : ''}${mawkzySeriesDiff})`;
      // Highlight best for Series row
      const nwpoSeriesCell = document.getElementById('nwpo-series-total');
      const mawkzySeriesCell = document.getElementById('mawkzy-series-total');
      nwpoSeriesCell.classList.remove('highlight-best');
      mawkzySeriesCell.classList.remove('highlight-best');
      if (nwpoSeriesDiff > mawkzySeriesDiff) {
        nwpoSeriesCell.classList.add('highlight-best');
      } else if (mawkzySeriesDiff > nwpoSeriesDiff) {
        mawkzySeriesCell.classList.add('highlight-best');
      }
      // Highlight logic for each row
      rows.forEach(row => {
        const nwpoW = row.querySelector('.nwpo-win');
        const nwpoL = row.querySelector('.nwpo-loss');
        const mawkzyW = row.querySelector('.mawkzy-win');
        const mawkzyL = row.querySelector('.mawkzy-loss');
        if (nwpoW && nwpoL) {
          const w = parseInt(nwpoW.textContent) || 0;
          const l = parseInt(nwpoL.textContent) || 0;
          nwpoW.classList.remove('highlight-win', 'highlight-loss');
          nwpoL.classList.remove('highlight-win', 'highlight-loss');
          if (w > l) {
            nwpoW.classList.add('highlight-win');
            nwpoL.classList.add('highlight-win');
          } else if (w < l) {
            nwpoW.classList.add('highlight-loss');
            nwpoL.classList.add('highlight-loss');
          }
        }
        if (mawkzyW && mawkzyL) {
          const w = parseInt(mawkzyW.textContent) || 0;
          const l = parseInt(mawkzyL.textContent) || 0;
          mawkzyW.classList.remove('highlight-win', 'highlight-loss');
          mawkzyL.classList.remove('highlight-win', 'highlight-loss');
          if (w > l) {
            mawkzyW.classList.add('highlight-win');
            mawkzyL.classList.add('highlight-win');
          } else if (w < l) {
            mawkzyW.classList.add('highlight-loss');
            mawkzyL.classList.add('highlight-loss');
          }
        }
      });
    }
    document.querySelectorAll('td[contenteditable]').forEach(td => {
      td.addEventListener('input', updateTotals);
    });
    // Initialize totals on load
    updateTotals();
  </script>
</body>
</html>
